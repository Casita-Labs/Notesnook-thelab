server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    # worker-src blob: is required for Notesnook's SharedWorker/ServiceWorker
    # to function when accessed via a reverse proxy or Cloudflare tunnel.
    # Without it, sync gets stuck on "Decrypting your notes".
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss: ws:; media-src 'self' blob:; object-src 'none'; child-src 'self' blob:; worker-src 'self' blob:; frame-ancestors 'self'; form-action 'self'; base-uri 'self';" always;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Caching ────────────────────────────────────────────────────────────────
    # Static assets: 1 year (content-hashed filenames make this safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML: short cache so updates are picked up quickly
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Health check ───────────────────────────────────────────────────────────
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Deny hidden and backup files ───────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~ ~$ {
        deny all;
    }

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
}
